name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          status=0
          while IFS= read -r -d '' f; do
            if ! python3 -m json.tool "$f" > /dev/null; then
              echo "Invalid JSON: $f"
              status=1
            fi
          done < <(find . -name '*.json' -not -path './.git/*' -print0)
          exit $status
